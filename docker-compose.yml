services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - ADMIN_CODE=anggimotti
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "35343:80"
    depends_on:
      - backend

volumes:
  redis-data:
