<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Admin — SYS.METRICS</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components/topbar.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/components/card.css">
  <link rel="stylesheet" href="/css/components/table.css">
  <link rel="stylesheet" href="/css/pages/admin.css">
</head>
<body>

  <div class="topbar">
    <div class="logo red">⚙️ SYS.CONSOLE</div>
    <div class="spacer"></div>
    <button class="btn sm" onclick="refresh()">RE</button>
    <button class="btn sm red clickable" onclick="goBack()">EXIT</button>
  </div>

  <!-- Tab Bar -->
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">OVERVIEW</button>
    <button class="tab-btn" data-tab="users" onclick="switchTab('users')">USERS</button>
    <button class="tab-btn" data-tab="rankings" onclick="switchTab('rankings')">RANKS</button>
    <button class="tab-btn" data-tab="chat" onclick="switchTab('chat')">CHAT</button>
    <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">LOGS</button>
    <button class="tab-btn" data-tab="actions" onclick="switchTab('actions')">OP</button>
  </div>

  <main class="admin-layout">

    <!-- Overview -->
    <div id="tab-overview" class="tab-content active">
      <div id="stat-grid" class="stat-grid"></div>
      <div class="admin-section">
        <h3 class="section-label">ACTIVE ROOMS</h3>
        <table class="rank-table card">
          <thead><tr><th>ID</th><th>GAME</th><th>P</th><th>STATE</th><th>SCORE</th></tr></thead>
          <tbody id="rooms-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Users -->
    <div id="tab-users" class="tab-content">
      <div class="admin-section">
        <h3 class="section-label">ONLINE USERS</h3>
        <table class="rank-table card">
          <thead><tr><th>USER</th><th>ROOM</th><th>JOINED</th><th>ACT</th></tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Rankings -->
    <div id="tab-rankings" class="tab-content">
      <div class="admin-section">
        <div class="section-header">
          <h3 class="section-label">GLOBAL RANKINGS</h3>
          <button class="btn red sm" onclick="resetRankings()">RESET ALL</button>
        </div>
      </div>
      <div id="rankings-wrap"></div>
    </div>

    <!-- Chat Log -->
    <div id="tab-chat" class="tab-content">
      <div class="admin-section">
        <div class="section-header">
          <h3 class="section-label">CHAT LOG</h3>
          <button class="btn red sm" onclick="clearChat()">CLEAR</button>
        </div>
        <div id="chat-log" class="chat-log card"></div>
      </div>
    </div>

    <!-- Admin Logs -->
    <div id="tab-logs" class="tab-content">
      <div class="admin-section">
        <h3 class="section-label">ADMIN LOGS</h3>
        <div id="admin-logs" class="admin-logs card"></div>
      </div>
    </div>

    <!-- Actions -->
    <div id="tab-actions" class="tab-content">
      <div class="admin-section">
        <h3 class="section-label">BROADCAST</h3>
        <div class="card action-card">
          <div class="chat-input-row">
            <input id="bc-inp" class="inp" type="text" maxlength="200" placeholder="전체 공지 메시지…">
            <button class="btn primary sm" onclick="sendBroadcast()">SEND</button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script type="module" src="/js/pages/admin.js"></script>
</body>
</html>
