<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Game — SYS.METRICS</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components/topbar.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/components/card.css">
  <link rel="stylesheet" href="/css/components/chat.css">
  <link rel="stylesheet" href="/css/components/overlay.css">
  <link rel="stylesheet" href="/css/pages/game.css">
</head>
<body>

  <div class="topbar">
    <button class="btn sm" onclick="goLobby()">← LOBBY</button>
    <div class="score-row">
      <div class="score-item p0">
        <span id="name0" class="p-name">P1</span>
        <span id="sc0" class="p-score">0</span>
      </div>
      <div class="score-divider">:</div>
      <div class="score-item p1">
        <span id="sc1" class="p-score">0</span>
        <span id="name1" class="p-name">P2</span>
      </div>
    </div>
    <div class="online-badge sm" id="status-badge">WAITING</div>
  </div>

  <main class="game-layout">
    <!-- Canvas Area -->
    <div id="canvas-wrap" class="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="overlay" class="overlay">
        <div id="ov-title" class="overlay-title"></div>
        <div id="ov-sub" class="overlay-sub"></div>
        <button id="ov-btn" class="btn primary" onclick="requestRestart()">RESTART</button>
      </div>
    </div>

    <!-- Chat Area -->
    <section class="game-chat-section">
      <div class="chat-container card">
        <div id="chat-msgs" class="chat-msgs"></div>
        <div class="chat-input-row">
          <input id="chat-inp" class="inp" type="text" maxlength="200" placeholder="메시지…" autocomplete="off">
          <button id="chat-btn" class="btn primary sm">SEND</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/pages/game.js"></script>
</body>
</html>
